<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 322" role="img" aria-label="What is inside the sandbox" font-family="Inter, system-ui, sans-serif">
  <style>
    .sb-mod rect.body { transition: filter .2s; }
    svg:hover .sb-mod rect.body { filter: brightness(1.12); }
    .sb-scan { animation: sbscan 3.6s ease-in-out infinite; }
    @keyframes sbscan { 0%,100% { transform: translateY(0); } 50% { transform: translateY(192px); } }
    .sb-dot { animation: sbdot 2.2s ease-in-out infinite; }
    @keyframes sbdot { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .sb-scan, .sb-dot { animation: none; }
      .sb-scan { opacity: 0; }
    }
  </style>
  <defs>
    <linearGradient id="sbmod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243048"/><stop offset="1" stop-color="#1a2337"/>
    </linearGradient>
    <linearGradient id="sbcont" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(99,102,241,.12)"/><stop offset="1" stop-color="rgba(99,102,241,.03)"/>
    </linearGradient>
    <linearGradient id="sbscang" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(129,140,248,0)"/><stop offset=".5" stop-color="rgba(129,140,248,.16)"/><stop offset="1" stop-color="rgba(129,140,248,0)"/>
    </linearGradient>
    <clipPath id="sbclip"><rect x="24" y="16" width="672" height="232" rx="16"/></clipPath>
  </defs>

  <rect x="24" y="16" width="672" height="232" rx="16" fill="url(#sbcont)" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.6" stroke-dasharray="7 5"/>
  <rect class="sb-scan" clip-path="url(#sbclip)" x="24" y="16" width="672" height="40" fill="url(#sbscang)"/>
  <text x="44" y="44" fill="#a5b4fc" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" letter-spacing="1.5">SANDBOX &#183; one sealed container per bug</text>

  <g class="sb-mod">
    <rect class="body" x="44" y="60" width="632" height="56" rx="10" fill="url(#sbmod)" stroke="#6366f1" stroke-opacity=".85"/>
    <rect x="44" y="60" width="5" height="56" rx="2.5" fill="#818cf8"/>
    <circle cx="648" cy="88" r="11" fill="none" stroke="#818cf8" stroke-width="1.8"/><path d="M642,88 h12 M648,82 v12" stroke="#818cf8" stroke-width="1.8"/>
    <text x="68" y="86" fill="#fff" font-size="15" font-weight="700">Project source</text>
    <text x="68" y="105" fill="#94a3b8" font-size="12">the target source code, at the exact revision that contains the bug</text>
  </g>

  <g class="sb-mod">
    <rect class="body" x="44" y="124" width="632" height="56" rx="10" fill="url(#sbmod)" stroke="#6366f1" stroke-opacity=".85"/>
    <rect x="44" y="124" width="5" height="56" rx="2.5" fill="#a78bfa"/>
    <path d="M640,150 l10,8 -10,8 M652,166 h8" stroke="#a78bfa" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="150" fill="#fff" font-size="15" font-weight="700">Fuzz harness</text>
    <text x="68" y="169" fill="#94a3b8" font-size="12">runs any input through the code, and the sanitizer reports a fault as a crash</text>
  </g>

  <g class="sb-mod">
    <rect class="body" x="44" y="188" width="632" height="56" rx="10" fill="url(#sbmod)" stroke="#6366f1" stroke-opacity=".85"/>
    <rect x="44" y="188" width="5" height="56" rx="2.5" fill="#60a5fa"/>
    <circle cx="648" cy="216" r="10" fill="none" stroke="#60a5fa" stroke-width="1.8"/><path d="M648,209 v7 l5,4" stroke="#60a5fa" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="68" y="214" fill="#fff" font-size="15" font-weight="700">Fixed environment</text>
    <text x="68" y="233" fill="#94a3b8" font-size="12">pinned dependencies, prebuilt and ready to run, nothing to set up</text>
  </g>

  <text x="360" y="280" fill="#64748b" font-size="12" text-anchor="middle">never enters the container</text>
  <g class="sb-dot" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">
    <rect x="158" y="290" width="120" height="30" rx="15" fill="rgba(239,68,68,.08)" stroke="#ef4444" stroke-opacity=".6"/>
    <text x="218" y="309" fill="#f87171">&#10005; internet</text>
    <rect x="288" y="290" width="144" height="30" rx="15" fill="rgba(239,68,68,.08)" stroke="#ef4444" stroke-opacity=".6"/>
    <text x="360" y="309" fill="#f87171">&#10005; answer files</text>
    <rect x="442" y="290" width="120" height="30" rx="15" fill="rgba(239,68,68,.08)" stroke="#ef4444" stroke-opacity=".6"/>
    <text x="502" y="309" fill="#f87171">&#10005; API keys</text>
  </g>
</svg>
